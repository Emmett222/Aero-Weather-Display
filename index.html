<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <title>Aero Weather Display</title>
    <link rel="stylesheet" href="AeroWeatherStyle.css" />
</head>

<body id="body">
    <div id="timeContainer">
        <h1 id="timeTitle"></h1>
    </div>

    <div id="mainWrapper">
        <div id="weatherContainerTop">
            <div id="WeatherP0">Loading. Please wait...</div>
            <div id="WeatherP1"></div>
            <div id="WeatherP2"></div>
            <div id="WeatherP3"></div>
            <div id="WeatherP4"></div>
            <div id="WeatherP5"></div>
            <div id="WeatherP6"></div>
            <div id="WeatherP7"></div>
        </div>
        <div id="weatherContainerBottom">
            <div id="WeatherP8"></div>
            <div id="WeatherP9"></div>
            <div id="WeatherP10"></div>
            <div id="WeatherP11"></div>
            <div id="WeatherP12"></div>
            <div id="WeatherP13"></div>
            <div id="WeatherP14"></div>
            <div id="WeatherP15"></div>
        </div>
    </div>

    <div id="weekContainer">
        <div id="day0">temp</div>
        <div id="day1"></div>
        <div id="day2"></div>
        <div id="day3"></div>
        <div id="day4"></div>
        <div id="day5"></div>
        <div id="day6"></div>
    </div>

    <dialog id="settingsModal">
        <ul>
            <li>
                <div>
                    <input type="checkbox" id="12hourCheckbox">
                    <label for="12hourCheckbox">12-hour clock</label>
                </div>
            </li>
            <li>
                <div>
                    <input type="checkbox" id="showSeconds">
                    <label for="showSeconds">Show seconds</label>
                    <input type="checkbox" id="showYear">
                    <label for="showYear">Show year</label>
                </div>
            </li>
            <hr>
            <li>
                <div>
                    <input type="checkbox" id="tempType">
                    <label for="tempType">Use Fahrenheit</label>
                </div>
            </li>
            <hr>
            <li>
                <div>
                    <input type="checkbox" id="dayNight">
                    <label for="dayNight">Cycle dark/light theme based on time</label>
                    <br>
                    <input type="text" id="light" placeholder="Theme becomes light at:">
                    <label for="lightInput">(ex: <strong>7AM</strong>, ex: <strong>7</strong>)</label>
                    <br>
                    <input type="text" id="night" placeholder="Theme becomes dark at:">
                    <label for="nightInput">(ex: <strong>8PM</strong>, ex: <strong>20</strong>)</label>
                </div>
            </li>
            <hr>
        </ul>
        <button id="saveBtn">Done</button>
        <button id="importBtn">Import Settings</button>
        <button id="exportBtn">Export Settings</button>
    </dialog>

    <script type="module" src="js/main.js"></script>

</body>
